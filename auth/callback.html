<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating... - GreenOak Technologies</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f1f0f 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .callback-container {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(46, 204, 113, 0.3);
            border-top-color: #2ecc71;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #2ecc71;
        }

        p {
            color: #cccccc;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .error-message {
            color: #ff5252;
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid rgba(255, 82, 82, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .back-link {
            margin-top: 30px;
        }

        .back-link a {
            color: #2ecc71;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="callback-container">
        <div class="spinner"></div>
        <h1>Authenticating...</h1>
        <p>Please wait while we complete your sign-in.</p>
        
        <div class="error-message" id="error-message">
            <strong>Authentication Failed</strong>
            <p id="error-text"></p>
        </div>

        <div class="back-link">
            <a href="../login.html">← Back to Login</a>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Initialize Supabase client
        // Replace these with your actual Supabase project credentials
        const SUPABASE_URL = localStorage.getItem('greenoak_supabase_url') || window.GREENOAK_SUPABASE_URL || 'https://bxjsxhutoevieieofagg.supabase.co';
        const SUPABASE_ANON_KEY = localStorage.getItem('greenoak_supabase_anon_key') || window.GREENOAK_SUPABASE_ANON_KEY || 'sb_publishable_wKpUQTg1zL18-6XAP50qyw_JKEK1Ywa';
        const isSupabaseConfigured = () => (
            SUPABASE_URL &&
            SUPABASE_ANON_KEY &&
            !SUPABASE_URL.includes('YOUR_SUPABASE_URL') &&
            !SUPABASE_ANON_KEY.includes('YOUR_SUPABASE_ANON_KEY')
        );
        
        const supabase = isSupabaseConfigured()
            ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
            : null;

        // Storage keys
        const LOGGED_IN_KEY = 'greenoak_admin_logged_in';

        async function handleAuthCallback() {
            try {
                if (!isSupabaseConfigured()) {
                    showError('Supabase is not configured yet. Add your project URL and anon key before testing Google sign-in.');
                    return;
                }

                // Get the session from the URL hash
                const { data, error } = await supabase.auth.getSession();
                
                if (error) {
                    throw error;
                }

                if (data?.session) {
                    // User is authenticated
                    const user = data.session.user;
                    
                    // Store user info in localStorage
                    localStorage.setItem(LOGGED_IN_KEY, 'true');
                    localStorage.setItem('greenoak_logged_in_admin', JSON.stringify({
                        email: user.email,
                        name: user.user_metadata?.full_name || user.email,
                        avatar: user.user_metadata?.avatar_url,
                        provider: 'google',
                        role: 'admin'
                    }));

                    // Redirect to admin dashboard
                    window.location.href = new URL('../admin.html', window.location.href).href;
                } else {
                    // No session found, show error
                    showError('No authentication session found. Please try logging in again.');
                }
            } catch (error) {
                console.error('Auth callback error:', error);
                showError(error.message || 'An error occurred during authentication.');
            }
        }

        function showError(message) {
            document.querySelector('.spinner').style.display = 'none';
            document.querySelector('h1').textContent = 'Authentication Failed';
            document.querySelector('p').textContent = 'There was a problem signing you in.';
            
            const errorDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            errorText.textContent = message;
            errorDiv.style.display = 'block';
        }

        // Handle the auth callback when the page loads
        handleAuthCallback();
    </script>
</body>
</html>
