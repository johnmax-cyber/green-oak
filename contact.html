<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - GreenOak Technologies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f0f0f;
            --secondary: #1a1a1a;
            --accent: #FF6B6B;
            --accent-hover: #ff5252;
            --text: #ffffff;
            --text-muted: #a0a0a0;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--primary);
            color: var(--text);
            min-height: 100vh;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #0f0f0f 100%);
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 107, 107, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 107, 107, 0.05) 0%, transparent 50%);
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            letter-spacing: 2px;
        }

        .logo span {
            color: var(--accent);
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 40px;
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        nav a:hover, nav a.active {
            color: var(--accent);
        }

        /* Contact Section */
        .contact-section {
            min-height: 100vh;
            padding: 150px 50px 80px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .contact-container {
            max-width: 600px;
            width: 100%;
        }

        .contact-section h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 15px;
            text-align: center;
        }

        .contact-section .subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 50px;
            font-size: 16px;
        }

        /* Contact Info */
        .contact-info {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
        }

        .contact-info h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .contact-info a {
            color: var(--accent);
            text-decoration: none;
            font-size: 24px;
            font-weight: 600;
        }

        .contact-info a:hover {
            color: var(--accent-hover);
        }

        /* Contact Form */
        .contact-form {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 10px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-muted);
        }

        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: var(--accent);
            color: #0f0f0f;
            border: none;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(255, 107, 107, 0.3);
        }

        /* Footer */
        footer {
            padding: 40px 50px;
            text-align: center;
            border-top: 1px solid var(--glass-border);
        }

        footer p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            header {
                padding: 15px 20px;
            }

            nav a {
                margin-left: 20px;
                font-size: 12px;
            }

            .contact-section {
                padding: 120px 20px 40px;
            }

            .contact-section h1 {
                font-size: 36px;
            }

            .contact-form {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <header>
        <a href="index.html" class="logo">GreenOak <span>Technologies</span></a>
        <nav>
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="contact.html" class="active">Contact</a>
            <a href="admin.html">Admin</a>
        </nav>
    </header>

    <section class="contact-section">
        <div class="contact-container">
            <h1>Contact Us</h1>
            <p class="subtitle">For quick, reliable, and professional IT solutions tailored to your needs</p>

            <div class="contact-info">
                <h3>Phone</h3>
                <a href="tel:0701776778">0701776778</a>
            </div>

            <form class="contact-form" id="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone" placeholder="Your Phone Number">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Tell us about your IT needs..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 GreenOak Technologies. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get form data
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                message: document.getElementById('message').value,
                date: new Date().toLocaleString(),
                service: 'General Inquiry'
            };
            
            // Save to localStorage
            let bookings = JSON.parse(localStorage.getItem('greenoak_bookings')) || [];
            bookings.push(formData);
            localStorage.setItem('greenoak_bookings', JSON.stringify(bookings));
            
            alert('Thank you for your message! We will get back to you soon.');
            this.reset();
        });
    </script>
</body>
</html>
