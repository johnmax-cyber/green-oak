<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - GreenOak Technologies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            /* Light Mode */
            --bg-primary: #fafbfc;
            --bg-secondary: #f3f4f6;
            --bg-card: #ffffff;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --accent-subtle: rgba(37, 99, 235, 0.08);
            --error: #dc2626;
            --success: #16a34a;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        [data-theme="dark"] {
            /* Dark Mode */
            --bg-primary: #030712;
            --bg-secondary: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --accent-subtle: rgba(59, 130, 246, 0.15);
            --error: #f87171;
            --success: #4ade80;
            --border-color: #334155;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        body {
            background: var(--bg-primary) !important;
            color: var(--text-primary) !important;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .bg-animation {
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-primary) 100%) !important;
        }

        .bg-animation::before {
            background: 
                radial-gradient(circle at 20% 80%, var(--accent-subtle) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, var(--accent-subtle) 0%, transparent 50%) !important;
        }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        .theme-toggle:hover {
            background: var(--accent-subtle);
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-1px);
        }

        /* Override header */
        header#main-header {
            background: var(--bg-card) !important;
            border-bottom: 1px solid var(--border-color) !important;
            box-shadow: var(--shadow-sm) !important;
        }

        header#main-header .logo {
            color: var(--text-primary) !important;
            font-family: 'Playfair Display', serif !important;
        }

        header#main-header nav a {
            color: var(--text-secondary) !important;
            font-weight: 500 !important;
            transition: color 0.2s !important;
        }

        header#main-header nav a:hover,
        header#main-header nav a.active {
            color: var(--accent) !important;
        }

        /* Dashboard */
        .dashboard {
            padding: 32px !important;
        }

        .dashboard h1 {
            color: var(--text-primary) !important;
            font-family: 'Playfair Display', serif !important;
            font-size: 32px !important;
            font-weight: 600 !important;
        }

        .dashboard .subtitle {
            color: var(--text-muted) !important;
            font-size: 15px !important;
            margin-bottom: 32px !important;
        }

        .dashboard h2 {
            color: var(--text-primary) !important;
            font-size: 18px !important;
            font-weight: 600 !important;
            margin-bottom: 20px !important;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 12px !important;
            padding: 24px !important;
            box-shadow: var(--shadow-sm) !important;
            transition: transform 0.2s, box-shadow 0.2s !important;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md) !important;
        }

        .stat-card .number {
            color: var(--text-primary) !important;
            font-size: 36px !important;
            font-weight: 700 !important;
        }

        .stat-card .label {
            color: var(--text-muted) !important;
            font-size: 14px !important;
        }

        .stat-card .icon {
            font-size: 28px !important;
            margin-bottom: 8px !important;
        }

        .bookings-section {
            background: var(--bg-card) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 12px !important;
            padding: 24px !important;
            box-shadow: var(--shadow-sm) !important;
        }

        .booking-item {
            background: var(--bg-secondary) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 10px !important;
            padding: 16px !important;
            margin-bottom: 12px !important;
        }

        .booking-item h4 {
            color: var(--text-primary) !important;
            font-weight: 600 !important;
            margin-bottom: 8px !important;
        }

        .booking-item p {
            color: var(--text-secondary) !important;
            font-size: 13px !important;
            line-height: 1.5 !important;
        }

        .booking-date {
            color: var(--text-muted) !important;
            font-size: 12px !important;
            margin-top: 8px !important;
        }

        .no-bookings {
            color: var(--text-muted) !important;
            text-align: center;
            padding: 32px;
        }

        .clear-btn {
            background: var(--accent) !important;
            color: #ffffff !important;
            border: none !important;
            padding: 12px 24px !important;
            border-radius: 8px !important;
            font-weight: 600 !important;
            cursor: pointer !important;
            transition: all 0.2s !important;
            margin-top: 16px !important;
        }

        .clear-btn:hover {
            background: var(--accent-hover) !important;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3) !important;
        }

        /* Login overlay */
        #login-overlay {
            background: var(--bg-primary) !important;
        }

        #login-overlay > div {
            background: var(--bg-card) !important;
            border: 1px solid var(--border-color) !important;
            box-shadow: var(--shadow-xl) !important;
        }

        #login-overlay h2 {
            color: var(--text-primary) !important;
            font-family: 'Playfair Display', serif !important;
        }

        #login-overlay p {
            color: var(--text-muted) !important;
        }

        #login-overlay label {
            color: var(--text-secondary) !important;
            font-size: 13px !important;
            font-weight: 500 !important;
        }

        #login-overlay input,
        #login-overlay select {
            background: var(--bg-secondary) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-primary) !important;
            border-radius: 8px !important;
            padding: 12px 16px !important;
        }

        #login-overlay input::placeholder {
            color: var(--text-muted) !important;
        }

        #login-overlay button {
            background: var(--accent) !important;
            border-radius: 8px !important;
        }

        #login-overlay a {
            color: var(--text-muted) !important;
        }

        #login-error {
            background: rgba(220, 38, 38, 0.1) !important;
            border: 1px solid rgba(220, 38, 38, 0.2) !important;
            color: var(--error) !important;
        }

        /* Admin Management */
        .admin-management {
            background: var(--bg-card) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 12px !important;
            padding: 24px !important;
            margin-bottom: 32px !important;
            box-shadow: var(--shadow-sm) !important;
        }

        .admin-management h2 {
            color: var(--accent) !important;
            font-family: 'Playfair Display', serif !important;
            margin-bottom: 20px !important;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .admin-list {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
        }

        .admin-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: var(--bg-secondary);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .admin-list li .admin-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-list li .admin-email {
            color: var(--text-primary);
            font-weight: 500;
        }

        .admin-list li .admin-role {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 6px;
            background: var(--accent-subtle);
            color: var(--accent);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .admin-list li .admin-role.super {
            background: rgba(234, 179, 8, 0.15);
            color: #eab308;
        }

        .admin-list li .delete-btn {
            background: rgba(220, 38, 38, 0.1);
            color: var(--error);
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .admin-list li .delete-btn:hover {
            background: rgba(220, 38, 38, 0.2);
        }

        .admin-list li .delete-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .admin-success {
            background: rgba(22, 163, 74, 0.1);
            color: var(--success);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
            font-size: 13px;
            font-weight: 500;
        }

        .admin-error {
            background: rgba(220, 38, 38, 0.1);
            color: var(--error);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
            font-size: 13px;
            font-weight: 500;
        }

        .add-admin-form {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .add-admin-form input {
            flex: 1;
            min-width: 180px;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .add-admin-form input::placeholder {
            color: var(--text-muted);
        }

        .add-admin-form input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-subtle);
        }

        .add-admin-form select {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
        }

        .add-admin-form select option {
            background: var(--bg-card);
        }

        .add-admin-form button {
            padding: 12px 24px;
            background: var(--accent);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-admin-form button:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .current-admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent-subtle);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--accent);
            font-weight: 500;
            margin-left: 12px;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" onclick="toggleTheme()">
        <span class="icon" id="theme-icon">🌙</span>
        <span id="theme-text">Dark</span>
    </button>

    <!-- LOGIN OVERLAY -->
    <div id="login-overlay" style="position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;">
        <div style="border-radius:16px;padding:48px 40px;width:100%;max-width:400px;">
            <div style="text-align:center;margin-bottom:32px;">
                <div style="font-size:48px;margin-bottom:12px;">🔐</div>
                <h2 style="margin:0 0 6px;">Admin Login</h2>
                <p style="font-size:14px;margin:0;">GreenOak Technologies</p>
            </div>
            <div id="login-error" style="display:none;padding:10px 14px;border-radius:8px;font-size:14px;margin-bottom:20px;text-align:center;">
                Invalid credentials.
            </div>
            <div style="margin-bottom:18px;">
                <label style="display:block;font-size:13px;margin-bottom:8px;font-weight:500;">Select Admin</label>
                <select id="login-admin-select" style="width:100%;padding:12px 16px;border-radius:8px;font-size:15px;outline:none;box-sizing:border-box;cursor:pointer;">
                    <option value="">-- Select Admin --</option>
                </select>
            </div>
            <div style="margin-bottom:28px;">
                <label style="display:block;font-size:13px;margin-bottom:8px;font-weight:500;">Password</label>
                <input id="login-password" type="password" placeholder="Enter password" autocomplete="current-password"
                    style="width:100%;padding:12px 16px;border-radius:8px;font-size:15px;outline:none;box-sizing:border-box;"
                    onkeydown="if(event.key==='Enter')doLogin()">
            </div>
            <button onclick="doLogin()"
                style="width:100%;padding:14px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:0.5px;">
                Login</button>
            <p style="text-align:center;margin-top:16px;">
                <a href="login.html" style="font-size:13px;text-decoration:none;">Open full login page →</a>
            </p>
        </div>
    </div>

    <header id="main-header" style="display:none;">
        <a href="index.html" class="logo">GreenOak <span>Admin</span></a>
        <nav>
            <a href="index.html">Website</a>
            <a href="admin.html" class="active">Dashboard</a>
            <span class="current-admin-badge" id="current-admin-badge"></span>
            <a href="#" onclick="doLogout()" style="color:rgba(255,100,100,0.8);">Logout</a>
        </nav>
    </header>

    <div class="dashboard" id="main-dashboard" style="display:none;">
        <h1>Dashboard</h1>
        <p class="subtitle">Track your bookings and website visitors</p>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="icon">👥</div>
                <div class="number" id="visitor-count">0</div>
                <div class="label">Total Visitors</div>
            </div>
            <div class="stat-card">
                <div class="icon">📩</div>
                <div class="number" id="booking-count">0</div>
                <div class="label">Total Bookings</div>
            </div>
            <div class="stat-card">
                <div class="icon">📅</div>
                <div class="number" id="today-visitors">0</div>
                <div class="label">Today's Visitors</div>
            </div>
        </div>

        <!-- Admin Management Section -->
        <div class="admin-management" id="admin-management" style="display:none;">
            <h2>👑 Admin Management</h2>
            
            <div class="admin-success" id="admin-success"></div>
            <div class="admin-error" id="admin-error"></div>
            
            <ul class="admin-list" id="admin-list"></ul>

            <form class="add-admin-form" id="add-admin-form" onsubmit="addNewAdmin(event)">
                <input type="email" id="new-admin-email" placeholder="New admin email" required>
                <input type="password" id="new-admin-password" placeholder="Password (min 6 chars)" minlength="6" required>
                <select id="new-admin-role">
                    <option value="admin">Admin</option>
                    <option value="super_admin">Super Admin</option>
                </select>
                <button type="submit">Add Admin</button>
            </form>
        </div>

        <div class="bookings-section">
            <h2>Recent Bookings</h2>
            <div id="bookings-list">
                <p class="no-bookings">No bookings yet</p>
            </div>
            <button class="clear-btn" onclick="clearBookings()">Clear All Bookings</button>
        </div>
    </div>

    <script>
        // Theme Management
        function getTheme() {
            return localStorage.getItem('greenoak_theme') || 'light';
        }

        function setTheme(theme) {
            localStorage.setItem('greenoak_theme', theme);
            document.documentElement.setAttribute('data-theme', theme);
            
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            
            if (theme === 'dark') {
                icon.textContent = '☀️';
                text.textContent = 'Light';
            } else {
                icon.textContent = '🌙';
                text.textContent = 'Dark';
            }
        }

        function toggleTheme() {
            const currentTheme = getTheme();
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            setTheme(newTheme);
        }

        // Initialize theme
        document.addEventListener('DOMContentLoaded', function() {
            setTheme(getTheme());
        });

        // Storage keys
        const ADMIN_ACCOUNTS_KEY = 'greenoak_admin_accounts';
        const LOGGED_IN_KEY = 'greenoak_admin_logged_in';
        const LOGGED_IN_ADMIN_KEY = 'greenoak_logged_in_admin';

        // Security: HTML escape function to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Security: SHA-256 hash function for password hashing
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function getAdminAccounts() {
            const accounts = localStorage.getItem(ADMIN_ACCOUNTS_KEY);
            return accounts ? JSON.parse(accounts) : [];
        }

        function saveAdminAccounts(accounts) {
            localStorage.setItem(ADMIN_ACCOUNTS_KEY, JSON.stringify(accounts));
        }

        function getCurrentAdmin() {
            const adminData = localStorage.getItem(LOGGED_IN_ADMIN_KEY);
            return adminData ? JSON.parse(adminData) : null;
        }

        // Check authentication
        function checkAuth() {
            const loggedIn = localStorage.getItem(LOGGED_IN_KEY) === 'true';
            const currentAdmin = getCurrentAdmin();
            
            if (loggedIn && currentAdmin) {
                showDashboard();
            } else {
                localStorage.removeItem(LOGGED_IN_KEY);
                localStorage.removeItem(LOGGED_IN_ADMIN_KEY);
                populateAdminSelect();
                document.getElementById('login-overlay').style.display = 'flex';
            }
        }

        function populateAdminSelect() {
            const accounts = getAdminAccounts();
            const select = document.getElementById('login-admin-select');
            
            while (select.options.length > 1) {
                select.remove(1);
            }

            accounts.forEach((admin, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = admin.email + (admin.role === 'super_admin' ? ' (Super Admin)' : '');
                select.appendChild(option);
            });
        }

        function showDashboard() {
            const currentAdmin = getCurrentAdmin();
            
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-header').style.display = '';
            document.getElementById('main-dashboard').style.display = '';
            
            const badge = document.getElementById('current-admin-badge');
            badge.textContent = '👤 ' + currentAdmin.email;
            
            if (currentAdmin.role === 'super_admin') {
                document.getElementById('admin-management').style.display = 'block';
                loadAdminList();
            } else {
                document.getElementById('admin-management').style.display = 'none';
            }
            
            updateVisitors();
            loadBookings();
        }

        async function doLogin() {
            const adminIndex = document.getElementById('login-admin-select').value;
            const password = document.getElementById('login-password').value;
            const accounts = getAdminAccounts();

            if (adminIndex === '') {
                document.getElementById('login-error').textContent = 'Please select an admin account';
                document.getElementById('login-error').style.display = 'block';
                return;
            }

            const selectedAdmin = accounts[parseInt(adminIndex)];
            
            if (!selectedAdmin) {
                document.getElementById('login-error').textContent = 'Admin account not found';
                document.getElementById('login-error').style.display = 'block';
                return;
            }
            
            // Security: Compare hashed password
            const hashedInput = await hashPassword(password);
            if (hashedInput === selectedAdmin.passwordHash) {
                localStorage.setItem(LOGGED_IN_KEY, 'true');
                
                // Security: Store only non-sensitive data
                const safeAdminData = {
                    email: selectedAdmin.email,
                    role: selectedAdmin.role,
                    createdAt: selectedAdmin.createdAt
                };
                localStorage.setItem(LOGGED_IN_ADMIN_KEY, JSON.stringify(safeAdminData));
                
                document.getElementById('login-error').style.display = 'none';
                showDashboard();
            } else {
                document.getElementById('login-error').textContent = 'Invalid password';
                document.getElementById('login-error').style.display = 'block';
                document.getElementById('login-password').value = '';
            }
        }

        function doLogout() {
            localStorage.removeItem(LOGGED_IN_KEY);
            localStorage.removeItem(LOGGED_IN_ADMIN_KEY);
            location.reload();
        }

        // Admin Management
        function loadAdminList() {
            const accounts = getAdminAccounts();
            const currentAdmin = getCurrentAdmin();
            const list = document.getElementById('admin-list');
            
            if (accounts.length === 0) {
                list.innerHTML = '<li style="color: var(--text-muted);">No admin accounts found</li>';
                return;
            }

            list.innerHTML = accounts.map((admin, index) => {
                const isSuperAdmin = admin.role === 'super_admin';
                const isCurrentAdmin = admin.email === currentAdmin.email;
                const canDelete = !isSuperAdmin || accounts.filter(a => a.role === 'super_admin').length > 1;
                
                // Security: Use escapeHtml to prevent XSS
                const safeEmail = escapeHtml(admin.email);
                
                return `
                    <li>
                        <div class="admin-info">
                            <span class="admin-email">${safeEmail}</span>
                            <span class="admin-role ${isSuperAdmin ? 'super' : ''}">${isSuperAdmin ? '👑 Super' : 'Admin'}</span>
                            ${isCurrentAdmin ? '<span style="color: var(--text-muted);font-size:12px;">(You)</span>' : ''}
                        </div>
                        ${!isCurrentAdmin ? `<button class="delete-btn" onclick="deleteAdmin(${index})" ${!canDelete ? 'disabled' : ''}>Delete</button>` : ''}
                    </li>
                `;
            }).join('');

            const roleSelect = document.getElementById('new-admin-role');
            const hasSuperAdmin = accounts.some(a => a.role === 'super_admin');
            if (hasSuperAdmin) {
                roleSelect.value = 'admin';
                roleSelect.querySelector('option[value="super_admin"]').disabled = true;
            } else {
                roleSelect.querySelector('option[value="super_admin"]').disabled = false;
            }
        }

        async function addNewAdmin(event) {
            event.preventDefault();
            
            const email = document.getElementById('new-admin-email').value.trim();
            const password = document.getElementById('new-admin-password').value;
            const role = document.getElementById('new-admin-role').value;
            const accounts = getAdminAccounts();
            
            const successEl = document.getElementById('admin-success');
            const errorEl = document.getElementById('admin-error');
            
            if (accounts.some(a => a.email.toLowerCase() === email.toLowerCase())) {
                errorEl.textContent = 'An admin with this email already exists';
                errorEl.style.display = 'block';
                successEl.style.display = 'none';
                return;
            }

            // Security: Stronger password policy
            if (password.length < 8) {
                errorEl.textContent = 'Password must be at least 8 characters';
                errorEl.style.display = 'block';
                successEl.style.display = 'none';
                return;
            }
            if (!/[A-Z]/.test(password)) {
                errorEl.textContent = 'Password must contain at least one uppercase letter';
                errorEl.style.display = 'block';
                successEl.style.display = 'none';
                return;
            }
            if (!/[a-z]/.test(password)) {
                errorEl.textContent = 'Password must contain at least one lowercase letter';
                errorEl.style.display = 'block';
                successEl.style.display = 'none';
                return;
            }
            if (!/[0-9]/.test(password)) {
                errorEl.textContent = 'Password must contain at least one number';
                errorEl.style.display = 'block';
                successEl.style.display = 'none';
                return;
            }

            // Security: Hash password before storing
            const hashedPassword = await hashPassword(password);

            accounts.push({
                email: email,
                passwordHash: hashedPassword,
                role: role,
                createdAt: new Date().toISOString()
            });
            
            saveAdminAccounts(accounts);
            
            document.getElementById('new-admin-email').value = '';
            document.getElementById('new-admin-password').value = '';
            
            successEl.textContent = '✓ Admin "' + email + '" added successfully!';
            successEl.style.display = 'block';
            errorEl.style.display = 'none';
            
            loadAdminList();
            
            setTimeout(() => {
                successEl.style.display = 'none';
            }, 3000);
        }

        function deleteAdmin(index) {
            const accounts = getAdminAccounts();
            const admin = accounts[index];
            
            if (!admin) return;
            
            if (confirm('Are you sure you want to delete admin "' + admin.email + '"?')) {
                accounts.splice(index, 1);
                saveAdminAccounts(accounts);
                loadAdminList();
                
                const successEl = document.getElementById('admin-success');
                successEl.textContent = '✓ Admin deleted successfully!';
                successEl.style.display = 'block';
                
                setTimeout(() => {
                    successEl.style.display = 'none';
                }, 3000);
            }
        }

        // Dashboard Functions
        function updateVisitors() {
            const today = new Date().toDateString();
            let visitors = JSON.parse(localStorage.getItem('greenoak_visitors')) || { total: 0 };
            let todayVisitors = parseInt(localStorage.getItem('greenoak_today_visitors')) || 0;
            let todayDate = localStorage.getItem('greenoak_today_date') || '';

            if (todayDate !== today) {
                todayVisitors = 0;
                localStorage.setItem('greenoak_today_date', today);
            }

            visitors.total++;
            todayVisitors++;

            localStorage.setItem('greenoak_visitors', JSON.stringify(visitors));
            localStorage.setItem('greenoak_today_visitors', todayVisitors);

            document.getElementById('visitor-count').textContent = visitors.total;
            document.getElementById('today-visitors').textContent = todayVisitors;
        }

        function loadBookings() {
            const bookings = JSON.parse(localStorage.getItem('greenoak_bookings')) || [];
            document.getElementById('booking-count').textContent = bookings.length;

            const bookingsList = document.getElementById('bookings-list');

            if (bookings.length === 0) {
                bookingsList.innerHTML = '<p class="no-bookings">No bookings yet</p>';
                return;
            }

            bookings.sort((a, b) => new Date(b.date) - new Date(a.date));

            bookingsList.innerHTML = bookings.map(booking => `
                <div class="booking-item">
                    <div class="booking-info">
                        <h4>${booking.name}</h4>
                        <p><strong>Email:</strong> ${booking.email}</p>
                        <p><strong>Phone:</strong> ${booking.phone || '—'}</p>
                        <p><strong>Service:</strong> ${booking.service}</p>
                        <p style="margin-top:8px;padding:10px 12px;background:var(--accent-subtle);border-left:3px solid var(--accent);border-radius:6px;font-size:13px;line-height:1.5;"><strong>Message:</strong> ${booking.message || '—'}</p>
                    </div>
                    <div class="booking-date">${booking.date}</div>
                </div>
            `).join('');
        }

        function clearBookings() {
            if (confirm('Are you sure you want to clear all bookings?')) {
                localStorage.setItem('greenoak_bookings', JSON.stringify([]));
                loadBookings();
            }
        }

        checkAuth();
    </script>
</body>
</html>
