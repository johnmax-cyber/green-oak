<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - GreenOak Technologies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f0f0f;
            --secondary: #1a1a1a;
            --accent: #FF6B6B;
            --text: #ffffff;
            --text-muted: #a0a0a0;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --success: #4CAF50;
            --warning: #FFC107;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--primary);
            color: var(--text);
            min-height: 100vh;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #0f0f0f 100%);
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 107, 107, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 107, 107, 0.05) 0%, transparent 50%);
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            letter-spacing: 2px;
        }

        .logo span {
            color: var(--accent);
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 40px;
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        nav a:hover, nav a.active {
            color: var(--accent);
        }

        /* Dashboard */
        .dashboard {
            padding: 120px 50px 50px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .dashboard h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            margin-bottom: 10px;
        }

        .dashboard .subtitle {
            color: var(--text-muted);
            margin-bottom: 50px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .stat-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
        }

        .stat-card .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .stat-card .number {
            font-size: 56px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .stat-card .label {
            color: var(--text-muted);
            font-size: 16px;
        }

        /* Bookings Table */
        .bookings-section {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
        }

        .bookings-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            margin-bottom: 30px;
        }

        .booking-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--glass-border);
        }

        .booking-item:last-child {
            margin-bottom: 0;
        }

        .booking-info h4 {
            font-size: 16px;
            margin-bottom: 5px;
        }

        .booking-info p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .booking-date {
            color: var(--text-muted);
            font-size: 14px;
        }

        .no-bookings {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        /* Clear Button */
        .clear-btn {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .clear-btn:hover {
            background: var(--accent);
            color: var(--primary);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            header {
                padding: 15px 20px;
            }

            .dashboard {
                padding: 100px 20px 30px;
            }

            .dashboard h1 {
                font-size: 32px;
            }

            .booking-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <header>
        <a href="index.html" class="logo">GreenOak <span>Admin</span></a>
        <nav>
            <a href="index.html">Website</a>
            <a href="admin.html" class="active">Dashboard</a>
        </nav>
    </header>

    <div class="dashboard">
        <h1>Dashboard</h1>
        <p class="subtitle">Track your bookings and website visitors</p>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="icon">👥</div>
                <div class="number" id="visitor-count">0</div>
                <div class="label">Total Visitors</div>
            </div>
            <div class="stat-card">
                <div class="icon">📩</div>
                <div class="number" id="booking-count">0</div>
                <div class="label">Total Bookings</div>
            </div>
            <div class="stat-card">
                <div class="icon">📅</div>
                <div class="number" id="today-visitors">0</div>
                <div class="label">Today's Visitors</div>
            </div>
        </div>

        <div class="bookings-section">
            <h2>Recent Bookings</h2>
            <div id="bookings-list">
                <p class="no-bookings">No bookings yet</p>
            </div>
            <button class="clear-btn" onclick="clearBookings()">Clear All Bookings</button>
        </div>
    </div>

    <script>
        // Visitor Counter
        function updateVisitors() {
            const today = new Date().toDateString();
            
            // Get stored data
            let visitors = JSON.parse(localStorage.getItem('greenoak_visitors')) || { total: 0, today: 0, lastVisit: '' };
            let todayVisitors = parseInt(localStorage.getItem('greenoak_today_visitors')) || 0;
            let todayDate = localStorage.getItem('greenoak_today_date') || '';

            // Check if it's a new day
            if (todayDate !== today) {
                // New day, reset today's visitors
                todayVisitors = 0;
                localStorage.setItem('greenoak_today_date', today);
            }

            // Increment visitors
            visitors.total++;
            todayVisitors++;

            // Save to localStorage
            localStorage.setItem('greenoak_visitors', JSON.stringify(visitors));
            localStorage.setItem('greenoak_today_visitors', todayVisitors);

            // Update display
            document.getElementById('visitor-count').textContent = visitors.total;
            document.getElementById('today-visitors').textContent = todayVisitors;
        }

        // Load bookings
        function loadBookings() {
            const bookings = JSON.parse(localStorage.getItem('greenoak_bookings')) || [];
            document.getElementById('booking-count').textContent = bookings.length;

            const bookingsList = document.getElementById('bookings-list');
            
            if (bookings.length === 0) {
                bookingsList.innerHTML = '<p class="no-bookings">No bookings yet</p>';
                return;
            }

            // Sort by date (newest first)
            bookings.sort((a, b) => new Date(b.date) - new Date(a.date));

            bookingsList.innerHTML = bookings.map(booking => `
                <div class="booking-item">
                    <div class="booking-info">
                        <h4>${booking.name}</h4>
                        <p>${booking.email} | ${booking.phone}</p>
                        <p>${booking.service}</p>
                    </div>
                    <div class="booking-date">${booking.date}</div>
                </div>
            `).join('');
        }

        // Clear bookings
        function clearBookings() {
            if (confirm('Are you sure you want to clear all bookings?')) {
                localStorage.setItem('greenoak_bookings', JSON.stringify([]));
                loadBookings();
            }
        }

        // Initialize
        updateVisitors();
        loadBookings();
    </script>
</body>
</html>
