<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - GreenOak Technologies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f0f0f;
            --secondary: #1a1a1a;
            --accent: #FF6B6B;
            --text: #ffffff;
            --text-muted: #a0a0a0;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--primary);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #0f0f0f 100%);
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 107, 107, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 107, 107, 0.05) 0%, transparent 50%);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 50px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            backdrop-filter: blur(20px);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-logo .logo {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            letter-spacing: 2px;
        }

        .login-logo .logo span {
            color: var(--accent);
        }

        .login-logo p {
            color: var(--text-muted);
            margin-top: 10px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 10px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .forgot-password {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.3s;
        }

        .forgot-password:hover {
            color: #ff5252;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #0f0f0f;
            border: none;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }

        .divider span {
            padding: 0 15px;
        }

        .google-btn {
            width: 100%;
            padding: 14px;
            background: #ffffff;
            color: #333;
            border: none;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .google-btn:hover {
            background: #f5f5f5;
            transform: translateY(-2px);
        }

        .google-btn img {
            width: 20px;
            height: 20px;
        }

        .error-msg {
            color: #ff5252;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
        }

        .back-link a:hover {
            color: var(--accent);
        }

        /* Setup Section */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            padding-right: 50px;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: var(--accent);
        }

        .setup-note {
            margin-top: 30px;
            padding: 15px;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid var(--accent);
            border-radius: 12px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .setup-note strong {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <div class="login-container">
        <div class="login-logo">
            <a href="index.html" class="logo">GreenOak <span>Admin</span></a>
            <p>Sign in to access your dashboard</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Email or Username</label>
                <input type="text" id="email" name="email" placeholder="admin@greenoak.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    <button type="button" class="toggle-password" id="toggle-password">
                        <span class="eye-icon">👁</span>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="remember-me">
                    Remember me
                </label>
                <a href="#" class="forgot-password" onclick="showSetup(); return false;">Setup Admin Account</a>
            </div>

            <button type="submit" class="login-btn">Sign In</button>
            
            <p class="error-msg" id="error-msg">Invalid email or password</p>
        </form>

        <!-- Setup Form (hidden by default) -->
        <form id="setup-form" style="display: none;">
            <h3 style="text-align: center; margin-bottom: 20px; color: var(--accent);">Setup Admin Account</h3>
            <div class="form-group">
                <label for="setup-email">Admin Email</label>
                <input type="email" id="setup-email" placeholder="Enter admin email" required>
            </div>
            <div class="form-group">
                <label for="setup-password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="setup-password" placeholder="Enter password" required>
                    <button type="button" class="toggle-password" onclick="toggleSetupPassword()">
                        <span class="eye-icon">👁</span>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label for="setup-confirm">Confirm Password</label>
                <input type="password" id="setup-confirm" placeholder="Confirm password" required>
            </div>
            <button type="submit" class="login-btn">Create Account</button>
            <p class="error-msg" id="setup-error" style="display: none;">Passwords do not match</p>
            <p style="text-align: center; margin-top: 15px;">
                <a href="#" onclick="showLogin(); return false;" style="color: var(--text-muted);">Back to Login</a>
            </p>
        </form>

        <div class="divider">
            <span>or</span>
        </div>

        <button class="google-btn" id="google-btn">
            <img src="https://www.google.com/favicon.ico" alt="Google">
            Continue with Google
        </button>

        <div class="setup-note" id="setup-note" style="display: none;">
            <strong>No admin account yet?</strong><br>
            Click "Setup Admin Account" above to create one.
        </div>

        <div class="back-link">
            <a href="index.html">← Back to Website</a>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>

    <script>
        // Check if admin account exists
        const adminAccount = JSON.parse(localStorage.getItem('greenoak_admin_account'));

        // Check if already logged in
        if (localStorage.getItem('greenoak_admin_logged_in') === 'true') {
            window.location.href = 'admin.html';
        }

        // Show setup form
        function showSetup() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('setup-form').style.display = 'block';
        }

        // Show login form
        function showLogin() {
            document.getElementById('setup-form').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
        }

        // Toggle setup password visibility
        function toggleSetupPassword() {
            const passwordInput = document.getElementById('setup-password');
            const eyeIcon = document.querySelector('#setup-form .eye-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = '👁';
            }
        }

        // Setup admin account
        document.getElementById('setup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('setup-email').value;
            const password = document.getElementById('setup-password').value;
            const confirm = document.getElementById('setup-confirm').value;

            if (password !== confirm) {
                document.getElementById('setup-error').style.display = 'block';
                return;
            }

            // Save admin account
            localStorage.setItem('greenoak_admin_account', JSON.stringify({ email: email, password: password }));
            
            alert('Admin account created successfully! Please login.');
            showLogin();
        });

        // Load saved credentials if remember me was checked

        // Load saved credentials if remember me was checked
        window.addEventListener('DOMContentLoaded', function() {
            const savedEmail = localStorage.getItem('greenoak_admin_email');
            const savedPassword = localStorage.getItem('greenoak_admin_password');
            const rememberMe = localStorage.getItem('greenoak_remember_me');

            if (rememberMe === 'true' && savedEmail && savedPassword) {
                document.getElementById('email').value = savedEmail;
                document.getElementById('password').value = savedPassword;
                document.getElementById('remember-me').checked = true;
            }
        });

        // Toggle password visibility
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = this.querySelector('.eye-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = '👁';
            }
        });

        // Email/Password Login
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('remember-me').checked;

            // Check against stored admin account
            const storedAccount = JSON.parse(localStorage.getItem('greenoak_admin_account'));
            
            if (storedAccount && email === storedAccount.email && password === storedAccount.password) {
                // Save login state
                localStorage.setItem('greenoak_admin_logged_in', 'true');
                
                // Remember credentials if checkbox is checked
                if (rememberMe) {
                    localStorage.setItem('greenoak_admin_email', email);
                    localStorage.setItem('greenoak_admin_password', password);
                    localStorage.setItem('greenoak_remember_me', 'true');
                } else {
                    // Clear saved credentials if not remembering
                    localStorage.removeItem('greenoak_admin_email');
                    localStorage.removeItem('greenoak_admin_password');
                    localStorage.setItem('greenoak_remember_me', 'false');
                }
                
                window.location.href = 'admin.html';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        });

        // Google Login (Firebase - requires configuration)
        document.getElementById('google-btn').addEventListener('click', function() {
            alert('Google Login requires Firebase setup. Click "Setup Admin Account" to create your admin account.');
        });

        // Show setup note if no admin account exists
        if (!adminAccount) {
            document.getElementById('setup-note').style.display = 'block';
        }

        // Hide error message when typing
        document.getElementById('email').addEventListener('input', function() {
            document.getElementById('error-msg').style.display = 'none';
        });
        document.getElementById('password').addEventListener('input', function() {
            document.getElementById('error-msg').style.display = 'none';
        });
    </script>
</body>
</html>
